<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garage — The Showroom</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <canvas id="garage-canvas"></canvas>

    <div id="ui-overlay">
      <nav id="brand-nav">
        <!-- Brand tabs are injected by JS -->
      </nav>

      <div id="brand-info">
        <h1 id="brand-name"></h1>
        <p id="brand-tagline"></p>
        <div id="category-nav">
          <!-- Category pills injected per brand -->
        </div>
      </div>

      <div id="model-panel">
        <!-- Active model details injected here -->
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
